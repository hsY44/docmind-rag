services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: docmind-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - docmind-rag-pgdata:/var/lib/postgresql/data
volumes:
  docmind-rag-pgdata:
