spring:
  application:
    name: docmind-rag

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5433/docmind_rag
    username: docmind
    password: docmind  # local dev only

  ai:
    model:
      embedding: ollama  # fixed across profiles — single 768-dim vector space (see PLANNING.md)
      # openai starter autoconfigures these regardless of chat profile; unused here, disable so boot doesn't need an API key
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768  # nomic-embed-text
        index-type: HNSW
        distance-type: COSINE_DISTANCE
    mcp:
      client:
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            docmind:
              url: http://localhost:8080

docmind:
  mcp:
    # docmind-mcp-server의 X-API-Key와 같은 값 — 로컬 개발 기본값, 원격 배포 시 반드시
    # DOCMIND_MCP_API_KEY 환경변수로 교체
    api-key: ${DOCMIND_MCP_API_KEY:local-dev-api-key}

server:
  port: 8081
